name: Build Bluefin GNOME 50 (testing)

# Builds bluefin and bluefin-dx lts-testing-50 / lts-hwe-testing-50 using
# the same full build pipeline as GNOME 49, selecting GNOME 50 packages
# via the gnome-version input. Only runs on main branch pushes.
#
# pull_request and merge_group triggers intentionally omitted: the GNOME 50
# build currently fails with a dracut cross-device link error (EXDEV) on
# GitHub Actions runners, which blocks all Renovate PRs from auto-merging.
# This workflow runs post-merge (push) only until the build issue is resolved.

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/reusable-build-image.yml
    secrets: inherit
    with:
      image-name: bluefin
      tag-suffix: "50"
      gnome-version: "50"
      rechunk: ${{ github.event_name != 'pull_request' }}
      publish: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

  build-hwe:
    uses: ./.github/workflows/reusable-build-image.yml
    secrets: inherit
    with:
      image-name: bluefin
      tag-suffix: "50"
      gnome-version: "50"
      hwe: true
      rechunk: ${{ github.event_name != 'pull_request' }}
      publish: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

  build-dx:
    uses: ./.github/workflows/reusable-build-image.yml
    secrets: inherit
    with:
      image-name: bluefin-dx
      flavor: dx
      tag-suffix: "50"
      gnome-version: "50"
      rechunk: ${{ github.event_name != 'pull_request' }}
      publish: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

  build-dx-hwe:
    uses: ./.github/workflows/reusable-build-image.yml
    secrets: inherit
    with:
      image-name: bluefin-dx
      flavor: dx
      tag-suffix: "50"
      gnome-version: "50"
      hwe: true
      rechunk: ${{ github.event_name != 'pull_request' }}
      publish: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
