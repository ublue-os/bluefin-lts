name: Build Bluefin LTS DX

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - lts
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.detect.outputs.should_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Detect image changes
        id: detect
        uses: projectbluefin/actions/bootc-build/detect-changes@v1
        with:
          # bluefin-lts does not use bluefin's build_files/ or image-versions.yml defaults.
          # Keep these repo-local overrides aligned with docs/skills/ci-cd.md.
          filters: |
            image:
              - 'Containerfile'
              - 'build_scripts/**'
              - 'system_files/**'
              - 'image-versions.yaml'
              - 'Justfile'
            nvidia:
              - 'Containerfile'

  build:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.should_build == 'true' || github.event_name != 'pull_request'
    uses: ./.github/workflows/reusable-build-image.yml
    secrets: inherit
    with:
      image-name: bluefin-dx
      flavor: dx
      rechunk: ${{ github.event_name != 'pull_request' }}
      publish: ${{ (github.event_name == 'workflow_dispatch' && (github.ref == 'refs/heads/lts' || github.ref == 'refs/heads/main')) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
