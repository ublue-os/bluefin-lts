name: Build Bluefin GDX

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

on:
  pull_request:
    branches:
      - main
    paths:
      - Containerfile
      - Justfile
      - build_scripts/**
      - system_files/**
      - image-versions.yaml
  push:
    branches:
      - main  # testing only; production images published via workflow_dispatch
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.detect.outputs.should_build }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: projectbluefin/actions/bootc-build/detect-changes@v1
        id: detect
        with:
          filters: |
            image:
              - 'Containerfile'
              - 'build_scripts/**'
              - 'system_files/**'
              - 'image-versions.yaml'
              - 'Justfile'
            nvidia:
              - 'Containerfile'

  build:
    name: Build bluefin-gdx image
    needs: [detect-changes]
    if: |
      always() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.should_build == 'true')
    uses: projectbluefin/actions/.github/workflows/reusable-build.yml@26f03230ca1435957fa19fc506e9c1d33064f9d2 # v1
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    secrets: inherit
    with:
      brand_name: bluefin-gdx
      stream_name: ${{ github.ref == 'refs/heads/lts' && 'lts' || 'testing' }}
      image_flavors: '["main"]'
      architecture: '["x86_64"]'
