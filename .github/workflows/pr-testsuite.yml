name: PR Validation — testsuite

on:
  pull_request:
    branches:
      - main
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint & syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Check justfile syntax
        run: just check

      - name: Shellcheck
        run: just lint

  testsuite:
    name: E2E smoke
    permissions:
      contents: read
      packages: write  # testsuite pushes screenshot OCI artifacts to GHCR
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@main
    with:
      image: ghcr.io/projectbluefin/bluefin:lts-testing
      suites: smoke
