name: PR Validation — testsuite

on:
  pull_request:
    branches:
      - main
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint & syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: false

      - name: Validate PR
        uses: projectbluefin/actions/bootc-build/validate-pr@v1
        with:
          hadolint-config: ""
          shellcheck-glob: "build_scripts/**/*.sh"

  testsuite:
    name: E2E smoke
    permissions:
      contents: read
      packages: write  # testsuite pushes screenshot OCI artifacts to GHCR
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@12bd892e476ef930ae3240eff71402390bba8da9 # main
    with:
      image: ghcr.io/projectbluefin/bluefin:lts-testing
      suites: smoke
