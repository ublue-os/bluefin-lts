name: PR Validation — testsuite

on:
  pull_request:
    branches:
      - main
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint & syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: false

      - name: Guard against COPR usage (CentOS-incompatible)
        shell: bash
        run: |
          echo "Checking for COPR usage (incompatible with CentOS Stream 10)..."
          # LTS build logic lives in build_scripts/ only. Do not copy bluefin's build_files/ path here.
          if grep -r "copr enable\|copr_install_isolated\|dnf5 copr" build_scripts/ 2>/dev/null | grep -v "^Binary"; then
            echo ""
            echo "ERROR: Found COPR usage in build scripts."
            echo "bluefin-lts is built on CentOS Stream 10 where COPR does not exist."
            echo "Use EPEL or CentOS Stream repos instead."
            echo "See docs/skills/centos-vs-fedora.md for details."
            exit 1
          fi
          echo "No COPR usage found."

      - name: Validate PR
        uses: projectbluefin/actions/bootc-build/validate-pr@v1
        with:
          hadolint-config: ""
          # LTS shell lives under build_scripts/, not bluefin's build_files/.
          shellcheck-glob: "build_scripts/**/*.sh"

  testsuite:
    name: E2E smoke
    permissions:
      contents: read
      packages: write  # testsuite pushes screenshot OCI artifacts to GHCR
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@927c1117c1f42df87089c4eaa15f4f978d21f576 # main
    with:
      image: ghcr.io/projectbluefin/bluefin:lts-testing
      suites: smoke
