name: PR Validation — testsuite

on:
  pull_request:
    branches:
      - main
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint & syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: false

      - name: Install just
        uses: taiki-e/install-action@d56249f532886d210664917b882ad7e152e17d68 # just

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Check justfile syntax
        run: just check

      - name: Shellcheck
        run: just lint
