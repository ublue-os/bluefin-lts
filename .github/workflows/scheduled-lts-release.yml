name: Scheduled LTS Release

on:
  schedule:
    - cron: '0 6 * * 2'  # Weekly on Tuesday at 6 AM UTC (1 AM EST / 2 AM EDT)
  workflow_dispatch:  # Allow manual triggering (bypasses 7-day promotion floor)

concurrency:
  group: scheduled-lts-release
  cancel-in-progress: false

permissions: {}

jobs:
  # Enforce a minimum 7-day floor between promotions to prevent churn.
  # workflow_dispatch bypasses the floor so maintainers can force a promotion
  # (e.g. after a hotfix or a failed previous run).
  check-promotion-floor:
    name: Check 7-day promotion floor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      should_promote: ${{ steps.floor.outputs.should_promote }}
    steps:
      - name: Check days since last stable release
        id: floor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual dispatch — bypassing promotion floor."
            echo "should_promote=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_RELEASE=$(gh release list \
            --repo "${{ github.repository }}" \
            --limit 1 \
            --json createdAt \
            --jq '.[0].createdAt // empty')

          if [[ -z "$LAST_RELEASE" ]]; then
            echo "No previous release found — first promotion, proceeding."
            echo "should_promote=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_TS=$(date -d "$LAST_RELEASE" +%s)
          NOW_TS=$(date +%s)
          DAYS_SINCE=$(( (NOW_TS - LAST_TS) / 86400 ))

          echo "Last stable release: $LAST_RELEASE (${DAYS_SINCE} days ago)"

          if [[ "$DAYS_SINCE" -lt 7 ]]; then
            echo "Floor not met (${DAYS_SINCE}/7 days) — skipping promotion this cycle."
            echo "should_promote=false" >> "$GITHUB_OUTPUT"
          else
            echo "Floor met (${DAYS_SINCE} days) — proceeding with promotion."
            echo "should_promote=true" >> "$GITHUB_OUTPUT"
          fi

  # Resolve the exact :testing digests for all 3 LTS variants and verify they
  # all share the same source commit SHA (org.opencontainers.image.revision).
  # NOTE: org.opencontainers.image.revision is inherited from the CentOS bootc
  # base image (upstream SHA), not from projectbluefin/bluefin-lts. We use it
  # only to verify cross-variant sync. The lts repo SHA is locked separately.
  resolve:
    name: Resolve :testing digests
    needs: [check-promotion-floor]
    if: needs.check-promotion-floor.outputs.should_promote == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      packages: read
      contents: read
    outputs:
      source_sha: ${{ steps.verify.outputs.source_sha }}
      locked_main_sha: ${{ steps.lock-main-sha.outputs.sha }}
      base_digest: ${{ steps.resolve-base.outputs.digest }}
      hwe_digest: ${{ steps.resolve-hwe.outputs.digest }}
      gdx_digest: ${{ steps.resolve-gdx.outputs.digest }}
    steps:
      - name: Log in to GHCR
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "$GH_TOKEN" | skopeo login ghcr.io --username "$GH_ACTOR" --password-stdin

      # Lock the projectbluefin/bluefin-lts main SHA at resolve time.
      # org.opencontainers.image.revision is the CentOS bootc upstream SHA —
      # not the LTS repo SHA — so we capture main separately for the promote
      # guard and lts branch fast-forward.
      - name: Lock current main SHA
        id: lock-main-sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/main --jq '.object.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "🔒 Locked main SHA: $SHA"

      - name: Resolve bluefin-lts :testing digest
        id: resolve-base
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/projectbluefin/bluefin-lts:testing"
          sudo podman pull "$IMAGE"
          DIGEST=$(sudo podman inspect "$IMAGE" --format '{{.Digest}}')
          SHA=$(sudo podman inspect "$IMAGE" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "bluefin-lts :testing → digest=$DIGEST, source_sha=$SHA"

      - name: Resolve bluefin-lts-hwe :testing digest
        id: resolve-hwe
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/projectbluefin/bluefin-lts-hwe:testing"
          sudo podman pull "$IMAGE"
          DIGEST=$(sudo podman inspect "$IMAGE" --format '{{.Digest}}')
          SHA=$(sudo podman inspect "$IMAGE" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "bluefin-lts-hwe :testing → digest=$DIGEST, source_sha=$SHA"

      - name: Resolve bluefin-gdx :testing digest
        id: resolve-gdx
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/projectbluefin/bluefin-gdx:testing"
          sudo podman pull "$IMAGE"
          DIGEST=$(sudo podman inspect "$IMAGE" --format '{{.Digest}}')
          SHA=$(sudo podman inspect "$IMAGE" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "bluefin-gdx :testing → digest=$DIGEST, source_sha=$SHA"

      - name: Verify all variants share the same source SHA
        id: verify
        env:
          BASE_SHA: ${{ steps.resolve-base.outputs.sha }}
          HWE_SHA: ${{ steps.resolve-hwe.outputs.sha }}
          GDX_SHA: ${{ steps.resolve-gdx.outputs.sha }}
        run: |
          set -euo pipefail

          if [[ -z "$BASE_SHA" ]]; then
            echo "ERROR: bluefin-lts :testing has no org.opencontainers.image.revision label"
            exit 1
          fi

          MISMATCH=0
          [[ "$HWE_SHA" != "$BASE_SHA" ]] && { echo "ERROR: bluefin-lts-hwe SHA ($HWE_SHA) != base SHA ($BASE_SHA)"; MISMATCH=1; }
          [[ "$GDX_SHA" != "$BASE_SHA" ]] && { echo "ERROR: bluefin-gdx SHA ($GDX_SHA) != base SHA ($BASE_SHA)"; MISMATCH=1; }

          if [[ "$MISMATCH" -eq 1 ]]; then
            echo "Variants are out of sync — skipping promotion until all variants share a common source SHA."
            exit 1
          fi

          echo "source_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "✅ All 3 variants share source SHA: $BASE_SHA"

  # Cosign-verify all 3 :testing digests before touching production tags.
  verify-signatures:
    name: Verify cosign signatures
    needs: [resolve]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: read
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify signatures for all LTS variants
        env:
          BASE_DIGEST: ${{ needs.resolve.outputs.base_digest }}
          HWE_DIGEST: ${{ needs.resolve.outputs.hwe_digest }}
          GDX_DIGEST: ${{ needs.resolve.outputs.gdx_digest }}
        run: |
          set -euo pipefail
          FAILED=0

          verify_digest() {
            local ref="$1"
            echo "Verifying signature: ${ref}"
            if ! cosign verify \
              --certificate-identity-regexp "https://github.com/projectbluefin/(bluefin-lts|actions)/.github/workflows/" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${ref}" 2>/dev/null; then
              echo "::error::Signature verification FAILED for ${ref}"
              return 1
            fi
            echo "  ✅ Verified: ${ref}"
          }

          verify_digest "ghcr.io/projectbluefin/bluefin-lts@${BASE_DIGEST}"     || FAILED=$((FAILED+1))
          verify_digest "ghcr.io/projectbluefin/bluefin-lts-hwe@${HWE_DIGEST}"  || FAILED=$((FAILED+1))
          verify_digest "ghcr.io/projectbluefin/bluefin-gdx@${GDX_DIGEST}"      || FAILED=$((FAILED+1))

          if [[ "$FAILED" -gt 0 ]]; then
            echo "::error::${FAILED} image(s) failed signature verification — aborting promotion"
            exit 1
          fi
          echo "✅ All 3 variants passed signature verification"

  # Lifecycle upgrade test against the pinned :testing digest.
  # Preserves the existing e2e guarantee before any production tag is written.
  # TODO(#102): tighten once testsuite registry-prefix check is fixed
  # (ghcr.io/ublue-os/ hardcode blocks projectbluefin/ images).
  run-upgrade-test:
    name: Upgrade test (lifecycle)
    needs: [resolve, verify-signatures]
    permissions:
      packages: write
      contents: read
      id-token: write
    uses: projectbluefin/actions/.github/workflows/upgrade-test.yml@v1
    with:
      image: ghcr.io/projectbluefin/bluefin-lts@${{ needs.resolve.outputs.base_digest }}
      suites: lifecycle
      chunked_enabled: false

  # Skopeo-copy all 3 variants by digest to :lts — no rebuild.
  # The image that passed e2e is exactly the image published to production.
  promote:
    name: Promote :testing → :lts
    needs: [resolve, verify-signatures, run-upgrade-test]
    # Allow promotion even if the upgrade test fails — the testsuite hardcodes
    # ghcr.io/ublue-os/ while LTS images are at ghcr.io/projectbluefin/
    # causing an unavoidable false positive (tracked in #102).
    if: >-
      always() &&
      needs.resolve.result == 'success' &&
      needs.verify-signatures.result == 'success' &&
      (needs.run-upgrade-test.result == 'success' || needs.run-upgrade-test.result == 'failure')
    # TODO(#94): Re-add environment: production gate once reviewer assignments confirmed.
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      packages: write
      contents: read
    steps:
      - name: Log in to GHCR
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "$GH_TOKEN" | skopeo login ghcr.io --username "$GH_ACTOR" --password-stdin

      - name: Verify source SHA has not advanced
        env:
          LOCKED_SHA: ${{ needs.resolve.outputs.locked_main_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CURRENT_SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/main --jq '.object.sha')
          if [[ "$CURRENT_SHA" != "$LOCKED_SHA" ]]; then
            echo "ERROR: main advanced during e2e ($LOCKED_SHA → $CURRENT_SHA)"
            echo "Untested commits would reach :lts. Aborting — rerun next cycle."
            exit 1
          fi
          echo "✅ main SHA unchanged: $CURRENT_SHA"

      - name: Copy all variants to :lts by digest
        env:
          BASE_DIGEST: ${{ needs.resolve.outputs.base_digest }}
          HWE_DIGEST: ${{ needs.resolve.outputs.hwe_digest }}
          GDX_DIGEST: ${{ needs.resolve.outputs.gdx_digest }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          copy_to_lts() {
            local image="$1"
            local digest="$2"
            echo "Promoting ${image}@${digest} → ${image}:lts"
            skopeo copy --all \
              "docker://${image}@${digest}" \
              "docker://${image}:lts"
            echo "  ✅ ${image}:lts updated"
          }

          copy_to_lts "ghcr.io/projectbluefin/bluefin-lts"     "$BASE_DIGEST"
          copy_to_lts "ghcr.io/projectbluefin/bluefin-lts-hwe" "$HWE_DIGEST"
          copy_to_lts "ghcr.io/projectbluefin/bluefin-gdx"     "$GDX_DIGEST"

          echo "✅ All 3 variants promoted to :lts (no rebuild)"

  # Fast-forward the lts branch to the promoted source SHA so git history
  # and changelog generation stay aligned with the live image.
  update-lts-branch:
    name: Fast-forward lts branch
    needs: [resolve, promote]
    if: always() && needs.promote.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Fast-forward lts to promoted source SHA
        env:
          SOURCE_SHA: ${{ needs.resolve.outputs.locked_main_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          LTS_SHA=$(gh api "repos/${REPO}/git/ref/heads/lts" --jq '.object.sha')

          # Check if lts already contains SOURCE_SHA (sync-main-to-lts.yml may
          # have already merged it as a merge commit, making lts "ahead").
          COMPARE=$(gh api "repos/${REPO}/compare/${SOURCE_SHA}...${LTS_SHA}" --jq '.status')
          if [[ "$COMPARE" == "identical" || "$COMPARE" == "ahead" ]]; then
            echo "✅ lts already contains ${SOURCE_SHA} (lts is ${COMPARE}) — no-op"
            exit 0
          fi

          # lts is behind — fast-forward it
          if ! gh api "repos/${REPO}/git/refs/heads/lts" \
              --method PATCH \
              --field sha="$SOURCE_SHA" \
              --field force=false 2>/dev/null; then
            echo "ERROR: Could not fast-forward lts branch to $SOURCE_SHA"
            echo "This may indicate lts has diverged. Manual intervention required."
            exit 1
          fi
          echo "✅ lts branch fast-forwarded to $SOURCE_SHA"

  generate-release:
    name: Generate release
    needs: [update-lts-branch]
    if: always() && needs.update-lts-branch.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write
    steps:
      - name: Dispatch and wait for release generation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          DISPATCH_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run generate-release.yml --ref main -f target=lts \
            -R ${{ github.repository }}
          echo "Dispatched generate-release.yml at $DISPATCH_TIME"

          sleep 30

          RUN_ID=""
          for i in $(seq 1 20); do
            RUN_ID=$(gh run list \
              --workflow generate-release.yml \
              --branch main \
              --event workflow_dispatch \
              --repo ${{ github.repository }} \
              --limit 5 \
              --json databaseId,createdAt \
              --jq ".[] | select(.createdAt >= \"$DISPATCH_TIME\") | .databaseId" \
              | head -1)
            [ -n "$RUN_ID" ] && break
            echo "Waiting for generate-release.yml run to appear (attempt $i/20)..."
            sleep 15
          done

          if [ -z "$RUN_ID" ]; then
            echo "ERROR: Could not locate generate-release.yml run dispatched at $DISPATCH_TIME"
            exit 1
          fi

          echo "Watching generate-release.yml run $RUN_ID..."
          gh run watch "$RUN_ID" --exit-status --repo ${{ github.repository }}
          echo "✅ Release generated successfully"

  close-failure-issue:
    name: Close stale failure issue on success
    needs: [promote]
    if: always() && needs.promote.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Close open failure issue if present
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = 'ci: weekly LTS release failure';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'area/testing,kind/bug',
              state: 'open',
            });
            const open = existing.data.find(i => i.title === title);
            if (open) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.info(`Closed stale failure issue #${open.number}`);
            }

  report-failure:
    needs: [resolve, verify-signatures, run-upgrade-test, promote]
    if: always() && failure() && needs.resolve.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Open or update failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = 'ci: weekly LTS release failure';

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'area/testing,kind/bug',
              state: 'open',
            });
            const dup = existing.data.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body: `Failure recurred in run ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `## Weekly LTS Release Failure\n\n**Run:** ${runUrl}\n\n_Automatically opened by scheduled-lts-release.yml_`,
                labels: ['area/testing', 'kind/bug'],
              });
            }
