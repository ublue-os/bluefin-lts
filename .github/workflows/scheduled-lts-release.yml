name: Scheduled LTS Release

on:
  schedule:
    - cron: '0 6 * * 2'  # Weekly on Tuesday at 6 AM UTC (1 AM EST / 2 AM EDT)
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read
  actions: write
  packages: read

concurrency:
  group: scheduled-lts-release
  cancel-in-progress: false

jobs:
  # ── Dispatch all 5 LTS builds and capture their run IDs ──────────────────
  # Outputs one run ID per build so the watch-builds matrix can fan-out and
  # wait for all 5 in parallel rather than sequentially (~60 min vs ~5 h).
  trigger-lts-builds:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ghcr.io/projectbluefin/bluefin:lts
    timeout-minutes: 30
    outputs:
      dispatch_time: ${{ steps.dispatch.outputs.dispatch_time }}
      regular_id:     ${{ steps.find-ids.outputs.regular_id }}
      dx_id:          ${{ steps.find-ids.outputs.dx_id }}
      gdx_id:         ${{ steps.find-ids.outputs.gdx_id }}
      regular_hwe_id: ${{ steps.find-ids.outputs.regular_hwe_id }}
      dx_hwe_id:      ${{ steps.find-ids.outputs.dx_hwe_id }}
    steps:
      - name: Trigger all LTS builds on lts branch
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DISPATCH_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "dispatch_time=${DISPATCH_TIME}" >> "$GITHUB_OUTPUT"

          gh workflow run build-regular.yml     --ref lts -R ${{ github.repository }}
          gh workflow run build-dx.yml          --ref lts -R ${{ github.repository }}
          gh workflow run build-gdx.yml         --ref lts -R ${{ github.repository }}
          gh workflow run build-regular-hwe.yml --ref lts -R ${{ github.repository }}
          gh workflow run build-dx-hwe.yml      --ref lts -R ${{ github.repository }}

          echo "✅ Triggered all 5 LTS build workflows on lts branch"

      - name: Resolve run IDs for all 5 builds
        id: find-ids
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_TIME: ${{ steps.dispatch.outputs.dispatch_time }}
        run: |
          set -euo pipefail

          # Give the API time to register all 5 dispatched runs.
          sleep 60

          resolve_run_id() {
            local workflow="$1"
            local run_id=""
            for i in $(seq 1 20); do
              run_id=$(gh run list \
                --workflow "${workflow}" \
                --branch lts \
                --event workflow_dispatch \
                --repo ${{ github.repository }} \
                --limit 10 \
                --json databaseId,createdAt \
                --jq ".[] | select(.createdAt >= \"${DISPATCH_TIME}\") | .databaseId" \
                | head -1)
              [ -n "$run_id" ] && { echo "$run_id"; return 0; }
              echo "Waiting for ${workflow} run to appear (attempt ${i}/20)..." >&2
              sleep 30
            done
            echo "ERROR: Could not locate ${workflow} run dispatched at ${DISPATCH_TIME}" >&2
            return 1
          }

          REGULAR_ID=$(resolve_run_id build-regular.yml)
          DX_ID=$(resolve_run_id build-dx.yml)
          GDX_ID=$(resolve_run_id build-gdx.yml)
          REGULAR_HWE_ID=$(resolve_run_id build-regular-hwe.yml)
          DX_HWE_ID=$(resolve_run_id build-dx-hwe.yml)

          {
            echo "regular_id=${REGULAR_ID}"
            echo "dx_id=${DX_ID}"
            echo "gdx_id=${GDX_ID}"
            echo "regular_hwe_id=${REGULAR_HWE_ID}"
            echo "dx_hwe_id=${DX_HWE_ID}"
          } >> "$GITHUB_OUTPUT"

          echo "✅ Resolved run IDs:"
          echo "  build-regular:     ${REGULAR_ID}"
          echo "  build-dx:          ${DX_ID}"
          echo "  build-gdx:         ${GDX_ID}"
          echo "  build-regular-hwe: ${REGULAR_HWE_ID}"
          echo "  build-dx-hwe:      ${DX_HWE_ID}"

  # ── Watch all 5 builds in parallel ───────────────────────────────────────
  # Each matrix entry watches one build. All 5 run concurrently so the total
  # wall-clock time is ~60–90 min (longest single build) instead of ~5 hours.
  # fail-fast: false ensures one slow build doesn't cancel the others.
  watch-builds:
    name: "Watch ${{ matrix.name }}"
    needs: trigger-lts-builds
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - name: regular
            run_id: ${{ needs.trigger-lts-builds.outputs.regular_id }}
          - name: dx
            run_id: ${{ needs.trigger-lts-builds.outputs.dx_id }}
          - name: gdx
            run_id: ${{ needs.trigger-lts-builds.outputs.gdx_id }}
          - name: regular-hwe
            run_id: ${{ needs.trigger-lts-builds.outputs.regular_hwe_id }}
          - name: dx-hwe
            run_id: ${{ needs.trigger-lts-builds.outputs.dx_hwe_id }}
    steps:
      - name: Wait for ${{ matrix.name }} build to complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Watching ${{ matrix.name }} run ${{ matrix.run_id }}..."
          gh run watch "${{ matrix.run_id }}" \
            --exit-status \
            --repo ${{ github.repository }}
          echo "✅ ${{ matrix.name }} build completed successfully"

  verify-signatures:
    name: Verify cosign signatures
    needs: watch-builds
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        run: |
          set -euo pipefail
          COSIGN_VERSION="v2.5.0"
          sudo curl -fsSL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign

      - name: Verify published LTS image signatures
        run: |
          set -euo pipefail

          IMAGE_REFS=(
            ghcr.io/projectbluefin/bluefin:lts
            ghcr.io/projectbluefin/bluefin-dx:lts
            ghcr.io/projectbluefin/bluefin-gdx:lts
            ghcr.io/projectbluefin/bluefin:lts-hwe
            ghcr.io/projectbluefin/bluefin-dx:lts-hwe
          )

          for image in "${IMAGE_REFS[@]}"; do
            echo "Verifying signature: ${image}"
            cosign verify \
              --certificate-identity-regexp "https://github.com/projectbluefin/bluefin-lts/.github/workflows/" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${image}"
            echo "✅ Signature verified: ${image}"
          done

  run-upgrade-test:
    name: Upgrade test (lifecycle)
    needs: [watch-builds, verify-signatures]
    permissions:
      packages: write
      contents: read
      id-token: write
    uses: projectbluefin/actions/.github/workflows/upgrade-test.yml@v1
    with:
      image: ghcr.io/projectbluefin/bluefin:lts
      suites: lifecycle
      chunked_enabled: false

  generate-release:
    name: Generate release
    needs: [watch-builds, run-upgrade-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Trigger release generation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run generate-release.yml --ref main -f target=lts \
            -R ${{ github.repository }}
          echo "✅ Triggered release generation (all builds + upgrade test passed)"
          echo "View workflow runs at: ${{ github.server_url }}/${{ github.repository }}/actions"

  report-failure:
    needs: [trigger-lts-builds, watch-builds, verify-signatures, run-upgrade-test, generate-release]
    if: always() && failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Open or update failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = 'ci: weekly LTS release failure';

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'area/testing,kind/bug',
              state: 'open',
            });
            const dup = existing.data.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body: `Failure recurred in run ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `## Weekly LTS Release Failure\n\n**Run:** ${runUrl}\n\n_Automatically opened by scheduled-lts-release.yml_`,
                labels: ['area/testing', 'kind/bug'],
              });
            }
