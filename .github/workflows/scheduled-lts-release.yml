name: Scheduled LTS Release

on:
  schedule:
    - cron: '0 6 * * 2'  # Weekly on Tuesday at 6 AM UTC (1 AM EST / 2 AM EDT)
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read
  actions: write
  packages: read

concurrency:
  group: scheduled-lts-release
  cancel-in-progress: false

jobs:
  trigger-lts-builds:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ghcr.io/projectbluefin/bluefin:lts
    # Allow up to 3 hours for builds to complete before timing out.
    timeout-minutes: 180
    steps:
      - name: Trigger all LTS builds on lts branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Record time just before dispatch so we can find the run IDs afterward.
          echo "DISPATCH_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

          gh workflow run build-regular.yml --ref lts -R ${{ github.repository }}
          gh workflow run build-dx.yml --ref lts -R ${{ github.repository }}
          gh workflow run build-gdx.yml --ref lts -R ${{ github.repository }}
          gh workflow run build-regular-hwe.yml --ref lts -R ${{ github.repository }}
          gh workflow run build-dx-hwe.yml --ref lts -R ${{ github.repository }}

          echo "✅ Triggered all 5 LTS build workflows on lts branch"

      - name: Wait for regular LTS build to complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Wait for the API to register the newly dispatched run (usually < 30s).
          sleep 60

          # Find the build-regular.yml run dispatched after our trigger time.
          # Retry for up to 10 minutes in case of API lag.
          RUN_ID=""
          for i in $(seq 1 20); do
            RUN_ID=$(gh run list \
              --workflow build-regular.yml \
              --branch lts \
              --event workflow_dispatch \
              --repo ${{ github.repository }} \
              --limit 10 \
              --json databaseId,createdAt \
              --jq ".[] | select(.createdAt >= \"$DISPATCH_TIME\") | .databaseId" \
              | head -1)
            [ -n "$RUN_ID" ] && break
            echo "Waiting for build-regular.yml run to appear in API (attempt $i/20)..."
            sleep 30
          done

          if [ -z "$RUN_ID" ]; then
            echo "ERROR: Could not locate build-regular.yml run dispatched at $DISPATCH_TIME"
            exit 1
          fi

          echo "Watching build-regular.yml run $RUN_ID — this takes ~60 minutes..."
          # --exit-status causes this step to fail if the build fails,
          # preventing a release from being generated for a broken image.
          gh run watch "$RUN_ID" --exit-status --repo ${{ github.repository }}
          echo "✅ Regular LTS build completed successfully"

      - name: Wait for DX LTS build to complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # generate-release.yml inspects bluefin-dx:lts.YYYYMMDD in addition to bluefin:lts.YYYYMMDD.
          # build-dx.yml runs in parallel with build-regular.yml and can finish slightly later.
          # We must wait for it to complete before triggering release generation, otherwise
          # generate-release.yml will fail with "manifest unknown" on the bluefin-dx tag.
          RUN_ID=""
          for i in $(seq 1 20); do
            RUN_ID=$(gh run list \
              --workflow build-dx.yml \
              --branch lts \
              --event workflow_dispatch \
              --repo ${{ github.repository }} \
              --limit 10 \
              --json databaseId,createdAt \
              --jq ".[] | select(.createdAt >= \"$DISPATCH_TIME\") | .databaseId" \
              | head -1)
            [ -n "$RUN_ID" ] && break
            echo "Waiting for build-dx.yml run to appear in API (attempt $i/20)..."
            sleep 30
          done

          if [ -z "$RUN_ID" ]; then
            echo "ERROR: Could not locate build-dx.yml run dispatched at $DISPATCH_TIME"
            exit 1
          fi

          echo "Watching build-dx.yml run $RUN_ID..."
          gh run watch "$RUN_ID" --exit-status --repo ${{ github.repository }}
          echo "✅ DX LTS build completed successfully"

      - name: Wait for GDX LTS build to complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # generate-release.yml is triggered by workflow_run on "Build Bluefin LTS GDX",
          # making GDX the intended gate for release generation. Wait for it to complete
          # before triggering release generation so all production images are ready.
          RUN_ID=""
          for i in $(seq 1 20); do
            RUN_ID=$(gh run list \
              --workflow build-gdx.yml \
              --branch lts \
              --event workflow_dispatch \
              --repo ${{ github.repository }} \
              --limit 10 \
              --json databaseId,createdAt \
              --jq ".[] | select(.createdAt >= \"$DISPATCH_TIME\") | .databaseId" \
              | head -1)
            [ -n "$RUN_ID" ] && break
            echo "Waiting for build-gdx.yml run to appear in API (attempt $i/20)..."
            sleep 30
          done

          if [ -z "$RUN_ID" ]; then
            echo "ERROR: Could not locate build-gdx.yml run dispatched at $DISPATCH_TIME"
            exit 1
          fi

          echo "Watching build-gdx.yml run $RUN_ID..."
          gh run watch "$RUN_ID" --exit-status --repo ${{ github.repository }}
          echo "✅ GDX LTS build completed successfully"

      - name: Wait for regular HWE LTS build to complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RUN_ID=""
          for i in $(seq 1 20); do
            RUN_ID=$(gh run list \
              --workflow build-regular-hwe.yml \
              --branch lts \
              --event workflow_dispatch \
              --repo ${{ github.repository }} \
              --limit 10 \
              --json databaseId,createdAt \
              --jq ".[] | select(.createdAt >= \"$DISPATCH_TIME\") | .databaseId" \
              | head -1)
            [ -n "$RUN_ID" ] && break
            echo "Waiting for build-regular-hwe.yml run to appear in API (attempt $i/20)..."
            sleep 30
          done

          if [ -z "$RUN_ID" ]; then
            echo "ERROR: Could not locate build-regular-hwe.yml run dispatched at $DISPATCH_TIME"
            exit 1
          fi

          echo "Watching build-regular-hwe.yml run $RUN_ID..."
          gh run watch "$RUN_ID" --exit-status --repo ${{ github.repository }}
          echo "✅ Regular HWE LTS build completed successfully"

      - name: Wait for DX HWE LTS build to complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RUN_ID=""
          for i in $(seq 1 20); do
            RUN_ID=$(gh run list \
              --workflow build-dx-hwe.yml \
              --branch lts \
              --event workflow_dispatch \
              --repo ${{ github.repository }} \
              --limit 10 \
              --json databaseId,createdAt \
              --jq ".[] | select(.createdAt >= \"$DISPATCH_TIME\") | .databaseId" \
              | head -1)
            [ -n "$RUN_ID" ] && break
            echo "Waiting for build-dx-hwe.yml run to appear in API (attempt $i/20)..."
            sleep 30
          done

          if [ -z "$RUN_ID" ]; then
            echo "ERROR: Could not locate build-dx-hwe.yml run dispatched at $DISPATCH_TIME"
            exit 1
          fi

          echo "Watching build-dx-hwe.yml run $RUN_ID..."
          gh run watch "$RUN_ID" --exit-status --repo ${{ github.repository }}
          echo "✅ DX HWE LTS build completed successfully"

  verify-signatures:
    name: Verify cosign signatures
    needs: trigger-lts-builds
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        run: |
          set -euo pipefail
          COSIGN_VERSION="v2.5.0"
          sudo curl -fsSL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign

      - name: Verify published LTS image signatures
        run: |
          set -euo pipefail

          IMAGE_REFS=(
            ghcr.io/projectbluefin/bluefin:lts
            ghcr.io/projectbluefin/bluefin-dx:lts
            ghcr.io/projectbluefin/bluefin-gdx:lts
            ghcr.io/projectbluefin/bluefin:lts-hwe
            ghcr.io/projectbluefin/bluefin-dx:lts-hwe
          )

          for image in "${IMAGE_REFS[@]}"; do
            echo "Verifying signature: ${image}"
            cosign verify \
              --certificate-identity-regexp "https://github.com/projectbluefin/bluefin-lts/.github/workflows/" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${image}"
            echo "✅ Signature verified: ${image}"
          done

  run-upgrade-test:
    name: Upgrade test (lifecycle)
    needs: [trigger-lts-builds, verify-signatures]
    permissions:
      packages: write
      contents: read
      id-token: write
    uses: projectbluefin/actions/.github/workflows/upgrade-test.yml@v1
    with:
      image: ghcr.io/projectbluefin/bluefin:lts
      suites: lifecycle
      chunked_enabled: false

  generate-release:
    name: Generate release
    needs: [trigger-lts-builds, run-upgrade-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Trigger release generation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run generate-release.yml --ref main -f target=lts \
            -R ${{ github.repository }}
          echo "✅ Triggered release generation (e2e smoke passed)"
          echo "View workflow runs at: ${{ github.server_url }}/${{ github.repository }}/actions"
