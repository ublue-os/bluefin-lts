name: Generate Release

permissions:
  contents: write
  packages: read
  id-token: write  # needed for SBOM attestation in create-release

on:
  # Triggered by scheduled-lts-release.yml after successful digest promotion.
  workflow_dispatch:
    inputs:
      target:
        description: 'Target variant to release'
        required: true
        default: 'lts'
        type: choice
        options:
          - lts
          - gdx

jobs:
  generate-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      packages: read
      id-token: write

    steps:
      - name: Checkout lts branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: lts
          fetch-depth: 0

      - name: Resolve image and tag metadata
        id: meta
        env:
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail

          DATE="$(date -u +%Y%m%d)"
          TAG="lts-${DATE}"
          TITLE="${TAG}: LTS"

          case "$TARGET" in
            gdx)
              IMAGE="ghcr.io/projectbluefin/bluefin-gdx"
              ;;
            *)
              IMAGE="ghcr.io/projectbluefin/bluefin-lts"
              ;;
          esac

          {
            echo "tag=${TAG}"
            echo "title=${TITLE}"
            echo "image=${IMAGE}"
            echo "image_name=$(basename "${IMAGE}")"
          } >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release $TAG already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install skopeo
        if: steps.check.outputs.skip != 'true'
        run: sudo apt-get install -y --no-install-recommends skopeo

      - name: Log in to GHCR
        if: steps.check.outputs.skip != 'true'
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ github.token }}
        run: echo "$GH_TOKEN" | skopeo login ghcr.io --username "$GH_ACTOR" --password-stdin

      - name: Resolve promoted :lts digest
        if: steps.check.outputs.skip != 'true'
        id: digest
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
        run: |
          set -euo pipefail
          DIGEST=$(skopeo inspect --format '{{.Digest}}' "docker://${IMAGE}:lts")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Promoted digest: ${DIGEST}"

      - name: Download Syft
        if: steps.check.outputs.skip != 'true'
        id: setup-syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: v1.44.0

      - name: Generate SBOM from promoted :lts image
        if: steps.check.outputs.skip != 'true'
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.digest.outputs.digest }}
          IMAGE_NAME: ${{ steps.meta.outputs.image_name }}
          SYFT_CMD: ${{ steps.setup-syft.outputs.cmd }}
        run: |
          set -euo pipefail
          mkdir -p sbom_out
          "${SYFT_CMD}" "${IMAGE}@${DIGEST}" -o spdx-json="sbom_out/${IMAGE_NAME}.sbom.json"
          echo "Generated SBOM at sbom_out/${IMAGE_NAME}.sbom.json"

      - name: Create release
        if: steps.check.outputs.skip != 'true'
        uses: projectbluefin/actions/bootc-build/create-release@v1
        with:
          sbom-path: sbom_out/${{ steps.meta.outputs.image_name }}.sbom.json
          tag: ${{ steps.meta.outputs.tag }}
          title: ${{ steps.meta.outputs.title }}
          image: ${{ steps.meta.outputs.image }}
          digest: ${{ steps.digest.outputs.digest }}
          repo: ${{ github.repository }}
          project-name: Bluefin LTS
          badge-label: LTS
          accent-color: "#0ea5e9"
          docs-url: https://docs.projectbluefin.io/changelogs
          cert-identity-regexp: "https://github.com/projectbluefin/bluefin-lts/.github/workflows/"
          notable-packages: >-
            [
              {"sbom_name": "kernel", "label": "Kernel"},
              {"sbom_name": "gnome-shell", "label": "GNOME Shell"},
              {"sbom_name": "flatpak", "label": "Flatpak"},
              {"sbom_name": "bootc", "label": "bootc"}
            ]
          github-token: ${{ secrets.GITHUB_TOKEN }}
