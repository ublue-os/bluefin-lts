name: Promote Main to LTS

on:
  workflow_dispatch:
    inputs:
      pr_title:
        description: 'Pull request title'
        required: false
        default: 'Promote main to lts'
      pr_body:
        description: 'Pull request body'
        required: false
        default: |
          ## Summary
          Promotion of tested changes from `main` to `lts` production branch.
          
          **IMPORTANT**: This PR should ONLY contain commits from `main` → `lts`. Never merge in the opposite direction.

permissions:
  pull-requests: write
  issues: write

jobs:
  create-promotion-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --repo ${{ github.repository }} \
            --base lts \
            --head main \
            --title "${{ inputs.pr_title }}" \
            --body "${{ inputs.pr_body }}" \
            --label "promotion"
