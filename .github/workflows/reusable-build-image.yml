---
name: Build Image
on:
  workflow_call:
    inputs:
      image-name:
        description: "The name of the image to build"
        required: true
        type: string
      image-desc:
        description: "The description of the image to build"
        required: false
        type: string
        default: "Bluefin LTS, built on CentOS Stream with bootc"
      flavor:
        description: "The flavor of the image to build"
        required: false
        type: string
        default: ""
      platforms:
        description: "The platforms to build the image for"
        required: false
        type: string
        default: "amd64,arm64"
      centos-version:
        description: "The version of CentOS to build the image on"
        required: false
        type: string
        default: "stream10"
      rechunk:
        description: "Rechunk the build"
        required: false
        type: boolean
        default: true
      cleanup_runner:
        description: "Use the ublue cleanup action to clean up the runner before running the build"
        required: false
        type: boolean
        default: true
      hwe:
        description: "Enable experimental things during builds, such as gnome backport. Will build an extra `-hwe` tag."
        required: false
        type: boolean
        default: false
      publish:
        description: "Publish this image"
        required: false
        type: boolean
        # default: ${{ github.event_name != 'pull_request' }}
        default: false
      tag-suffix:
        description: "The suffix to append to the image tag"
        required: false
        type: string
        default: ""
      kernel-pin:
        description: "The kernel version to pin (e.g. 6.19.12-200.fc43)"
        required: false
        type: string
        default: ""
      gnome-version:
        description: "GNOME major version to build (50)"
        required: false
        type: string
        default: "50"

env:
  IMAGE_NAME: ${{ inputs.image-name }}
  IMAGE_DESC: ${{ inputs.image-desc }}
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "lts" # DO NOT CHANGE! (this will break everything)
  PRODUCTION_BRANCH: lts # This is the branch that everthing gets merged to at the end
  TESTING_BRANCH: main # This is there the PRs go to :)
  CENTOS_VERSION: ${{ inputs.centos-version }}
  PLATFORMS: ${{ inputs.platforms }}

jobs:
  generate_matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        env:
          PLATFORMS: "${{ inputs.platforms }}"
          ENABLE_HWE: "${{ inputs.hwe }}"
        run: |
          # turn the comma separated string into a list
          platforms=()
          # shellcheck disable=SC2153
          IFS=',' read -r -a platforms <<< "${PLATFORMS}"

          MATRIX="{\"include\":[]}"
          for platform in "${platforms[@]}"; do
            MATRIX="$(echo "${MATRIX}" | jq ".include += [{\"platform\": \"${platform}\"}]")"
          done
          echo "matrix=$(echo "${MATRIX}" | jq -c '.')" >> "$GITHUB_OUTPUT"

  build_push:
    name: Build and push image
    runs-on: ${{ matrix.platform == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    timeout-minutes: 60
    needs: generate_matrix
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.generate_matrix.outputs.matrix)}}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image_tag: ${{ steps.build-image.outputs.image_tag }}

    steps:
      - name: Setup runner
        uses: projectbluefin/actions/bootc-build/setup-runner@v1
        with:
          storage-backend: btrfs
          update-podman: "true"
          install-tools: '["just", "cosign", "oras", "syft"]'

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v10

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Setup Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Check Just Syntax
        shell: bash
        run: just check

      - name: Restore DNF cache
        uses: projectbluefin/actions/bootc-build/dnf-cache@v1
        with:
          action: restore
          cache-name: bluefin-lts-${{ matrix.platform }}-${{ env.CENTOS_VERSION }}
          architecture: ${{ matrix.platform }}

      - name: Build Image
        id: build-image
        shell: bash
        env:
          FLAVOR: ${{ inputs.flavor }}
          HWE: ${{ inputs.hwe }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG_SUFFIX: ${{ inputs.tag-suffix }}
        run: |
          set -x
          just=$(which just)

          ENABLE_HWE=0
          ENABLE_GDX=0
          ENABLE_DX=0
          if [[ "${HWE}" == "true" ]] ; then
            export DEFAULT_TAG="${DEFAULT_TAG}-hwe"
            ENABLE_HWE=1
          fi

          if [ "${REF_NAME}" != "${PRODUCTION_BRANCH}" ]; then
            export TAG_SUFFIX="testing"
            export DEFAULT_TAG="${DEFAULT_TAG}-${TAG_SUFFIX}"
          fi

          if [ -n "${INPUT_TAG_SUFFIX}" ]; then
            export DEFAULT_TAG="${DEFAULT_TAG}-${INPUT_TAG_SUFFIX}"
          fi

          echo "DEFAULT_TAG=${DEFAULT_TAG}" >> "${GITHUB_ENV}"
          if [[ "${FLAVOR}" =~ "gdx" ]] ; then
            ENABLE_GDX=1
          fi
          if [[ "${FLAVOR}" =~ "dx" ]] ; then
            ENABLE_DX=1
          fi

          sudo "$just" build "${IMAGE_NAME}" "${DEFAULT_TAG}" "${ENABLE_DX}" "${ENABLE_GDX}" "${ENABLE_HWE}" "${{ inputs.kernel-pin }}" "${{ inputs.gnome-version }}"
          echo "image_tag=${DEFAULT_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Setup Syft
        id: setup-syft
        if: ${{ github.ref == 'refs/heads/lts' && inputs.publish }}
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: v1.39.0

      - name: Generate SBOM
        id: generate-sbom
        if: ${{ github.ref == 'refs/heads/lts' && inputs.publish }}
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
          DEFAULT_TAG: ${{ env.DEFAULT_TAG }}
          SYFT_CMD: ${{ steps.setup-syft.outputs.cmd }}
        run: |
          sudo systemctl start podman.socket
          SBOM="$(mktemp -d)/sbom.json"
          export SYFT_PARALLELISM=$(($(nproc)*2))
          sudo "$SYFT_CMD" "${IMAGE}:${DEFAULT_TAG}" -o "spdx-json=${SBOM}"
          echo "SBOM=${SBOM}" >> "${GITHUB_OUTPUT}"

      - name: Rechunk image
        if: ${{ inputs.rechunk && inputs.publish }}
        uses: projectbluefin/actions/bootc-build/chunka@v1
        with:
          source-image: localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          output-image: localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          max-layers: "128"
          force-compression: "true"

      - name: Load Image
        if: ${{ inputs.publish }}
        id: load
        run: |
          IMAGE="localhost/${IMAGE_NAME}:${DEFAULT_TAG}"
          podman image tag "${IMAGE}" "${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}"

          IMAGE="${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}"
          IMAGE_DIGEST="$(podman image inspect --format '{{.Digest}}' "${IMAGE}")"
          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "digest=${IMAGE_DIGEST}" >> "${GITHUB_OUTPUT}"

      - name: Push image
        if: ${{ inputs.publish }}
        id: push
        uses: projectbluefin/actions/bootc-build/push-image@v1
        with:
          image-name: ${{ env.IMAGE_NAME }}
          tags: "${{ env.DEFAULT_TAG }}-${{ matrix.platform }}"
          registry: ghcr.io
          max-attempts: "3"
          retry-wait-seconds: "15"
          force-compression: "true"
          fix-auth-permissions: "true"
          github-token: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Save DNF cache
        if: always() && !cancelled()
        uses: projectbluefin/actions/bootc-build/dnf-cache@v1
        with:
          action: save
          cache-name: bluefin-lts-${{ matrix.platform }}-${{ env.CENTOS_VERSION }}
          architecture: ${{ matrix.platform }}
          allow-write: "true"

      - name: Sign and publish image
        if: ${{ inputs.publish }}
        id: sign
        uses: projectbluefin/actions/bootc-build/sign-and-publish@v1
        with:
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          digest: ${{ steps.push.outputs.digest }}
          signing-mode: keyless
          generate-sbom: ${{ github.ref == 'refs/heads/lts' && inputs.publish }}
          push-attestation: ${{ github.ref == 'refs/heads/lts' && inputs.publish }}
          github-token: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          syft-version: v1.44.0
          image-name: ${{ env.IMAGE_NAME }}

      - name: Create Job Outputs
        if: ${{ inputs.publish }}
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          PLATFORM: ${{ matrix.platform }}
          HWE: ${{ inputs.hwe }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          mkdir -p /tmp/outputs/digests
          echo "${DIGEST}" > "/tmp/outputs/digests/${IMAGE_NAME}-${HWE}-${PLATFORM}.txt"

      - name: Upload Output Artifacts
        if: ${{ inputs.publish }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.IMAGE_NAME }}-${{ matrix.platform }}${{ inputs.hwe && '-hwe' || '' }}${{ inputs.tag-suffix != '' && format('-{0}', inputs.tag-suffix) || '' }}
          retention-days: 1
          if-no-files-found: error
          path: |
            /tmp/outputs/digests/*.txt

  manifest:
    name: Create ${{ inputs.image-name }}:${{ inputs.centos-version }} Manifest
    runs-on: ubuntu-latest
    if: always()
    needs:
      - generate_matrix
      - build_push
    container:
      image:  cgr.dev/chainguard/wolfi-base:latest@sha256:441d6709305552a3411e585ad98aacb9dadda00c80f3267483c38ac6f86f49d4
      options: --privileged --security-opt seccomp=unconfined
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image: ${{ steps.push_manifest.outputs.IMAGE }}
      digest: ${{ steps.push_manifest.outputs.DIGEST }}
    steps:
      - name: Install dependencies
        run: |
          apk add jq git podman uutils bash conmon crun netavark fuse-overlayfs libstdc++
          ln -sf /bin/bash /bin/sh
          mkdir -p /etc/containers
          echo '{"default":[{"type":"insecureAcceptAnything"}]}' | jq . > /etc/containers/policy.json

      - name: Exit on failure
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          echo "Job status:"
          echo "$JOBS" | jq -r 'to_entries[] | " - \(.key): \(.value.result)"'

          for i in $(echo "${JOBS}" | jq -r 'to_entries[] | .value.result'); do
            if [ "$i" != "success" ] && [ "$i" != "skipped" ]; then
              echo ""
              echo "Status check not okay!"
              exit 1
            fi
          done

      - name: Add suffixes to other variations as well
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          HWE: ${{ inputs.hwe }}
          INPUT_TAG_SUFFIX: ${{ inputs.tag-suffix }}
        run: |
          export CENTOS_VERSION_SUFFIX=""
          if [[ "${HWE}" == "true" ]] ; then
            export DEFAULT_TAG="${DEFAULT_TAG}-hwe"
            export CENTOS_VERSION_SUFFIX="-hwe"
          fi
          if [ "${REF_NAME}" != "${PRODUCTION_BRANCH}" ]; then
            export TAG_SUFFIX="testing"
            export DEFAULT_TAG="${DEFAULT_TAG}-${TAG_SUFFIX}"
            export CENTOS_VERSION_SUFFIX="${CENTOS_VERSION_SUFFIX}-${TAG_SUFFIX}"
          fi
          if [ -n "${INPUT_TAG_SUFFIX}" ]; then
            export DEFAULT_TAG="${DEFAULT_TAG}-${INPUT_TAG_SUFFIX}"
            export CENTOS_VERSION_SUFFIX="${CENTOS_VERSION_SUFFIX}-${INPUT_TAG_SUFFIX}"
          fi
          echo "DEFAULT_TAG=${DEFAULT_TAG}" >> "${GITHUB_ENV}"
          echo "CENTOS_VERSION_SUFFIX=${CENTOS_VERSION_SUFFIX}" >> "${GITHUB_ENV}"

      - name: Get current date
        id: date
        run: |
          # Should generate a timestamp like what is defined on the ArtifactHub documentation
          # E.G: 2022-02-08T15:38:15Z'
          # https://artifacthub.io/docs/topics/repositories/container-images/
          # https://linux.die.net/man/1/date
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Extract numbers from input
        id: extract-numbers
        env:
          CENTOS_VERSION: ${{ env.CENTOS_VERSION }}
        run: |
          numbers_only=$(echo "${CENTOS_VERSION}" | tr -cd '0-9')
          echo "CENTOS_VERSION_NUMBER=${numbers_only}" >> "${GITHUB_ENV}"

      - name: Image Metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        id: metadata
        with:
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            type=raw,value=${{ env.DEFAULT_TAG }}-{{date 'YYYYMMDD'}}
            type=raw,value=${{ env.CENTOS_VERSION }}${{ env.CENTOS_VERSION_SUFFIX }}${{ env.TAG_SUFFIX }}
            type=raw,value=${{ env.CENTOS_VERSION }}${{ env.CENTOS_VERSION_SUFFIX }}${{ env.TAG_SUFFIX }}.{{date 'YYYYMMDD'}}
            type=raw,value=${{ env.CENTOS_VERSION_NUMBER }}${{ env.CENTOS_VERSION_SUFFIX }}${{ env.TAG_SUFFIX }}
            type=raw,value=${{ env.CENTOS_VERSION_NUMBER }}${{ env.CENTOS_VERSION_SUFFIX }}${{ env.TAG_SUFFIX }}.{{date 'YYYYMMDD'}}
            type=raw,value=${{ env.CENTOS_VERSION }}${{ env.CENTOS_VERSION_SUFFIX }}${{ env.TAG_SUFFIX }}-{{date 'YYYYMMDD'}}
            type=raw,value=${{ env.CENTOS_VERSION_NUMBER }}${{ env.CENTOS_VERSION_SUFFIX }}${{ env.TAG_SUFFIX }}-{{date 'YYYYMMDD'}}
            type=ref,event=pr
          labels: |
            bluefin.commit=${{ github.sha }}
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/refs/heads/main/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://docs.projectbluefin.io
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/main/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://projectbluefin.io
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.CENTOS_VERSION }}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=bootc,centos,bluefin,ublue,universal-blue
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=https://avatars.githubusercontent.com/u/120078124?s=200&v=4
            io.artifacthub.package.maintainers=[{\"name\":\"tulilirockz\",\"email\":\"tulilirockz@outlook.com\"},{\"name\":\"castrojo\",\"email\":\"jorge.castro@gmail.com\"}]
            io.artifacthub.package.prerelease=true
            containers.bootc=1

      - name: Fetch Build Outputs
        if: ${{ inputs.publish }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: ${{ env.IMAGE_NAME }}-*
          merge-multiple: true
          path: /tmp/artifacts

      - name: Load Outputs
        if: ${{ inputs.publish }}
        id: load-outputs
        run: |
          DIGESTS_JSON="$(jq -n '{}')"
          for digest_file in /tmp/artifacts/*.txt; do
            # Extract the platform from the file name
            PLATFORM="$(basename "${digest_file}" | rev | cut -d'-' -f1 | rev | cut -d'.' -f1)"
            DIGEST="$(cat "${digest_file}")"
            # Add the platform and digest to the JSON object
            DIGESTS_JSON="$(echo "${DIGESTS_JSON}" | jq --arg key "${PLATFORM}" --arg value "${DIGEST}" '. + {($key): $value}')"
          done
          echo "DIGESTS_JSON=$(echo "$DIGESTS_JSON" | jq -c '.')" >> "${GITHUB_OUTPUT}"

      - name: Create and push manifest
        if: ${{ inputs.publish }}
        id: push_manifest
        uses: projectbluefin/actions/bootc-build/create-manifest@v1
        with:
          image-name: ${{ env.IMAGE_NAME }}
          registry: ghcr.io
          digests-json: ${{ steps.load-outputs.outputs.DIGESTS_JSON }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          github-token: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

  # Cosign throws errors when ran inside the Fedora container for one reason or another
  # so we move this to another step in order to run on Ubuntu
  sign:
    needs: manifest
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Sign manifest
        uses: projectbluefin/actions/bootc-build/sign-and-publish@v1
        with:
          image: ${{ needs.manifest.outputs.image }}
          digest: ${{ needs.manifest.outputs.digest }}
          signing-mode: keyless
          generate-sbom: "false"
          push-attestation: "false"
          github-token: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
