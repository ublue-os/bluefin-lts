name: "Bug report"
description: "Something is broken. You are the only person who can confirm it."
labels: ["kind/bug", "status/triage"]
type: "Bug"
body:
  - type: markdown
    attributes:
      value: |
        ## You are the most important person in this process

        No agent can reproduce what happened on your machine. You are the ground truth.

        Run this before filling out the form:

        ```bash
        ujust report
        ```

  - type: markdown
    attributes:
      value: |
        > **How this gets resolved:**
        > ```
        > filed ──▶ triage ──▶ approved ──▶ queued ──▶ claimed ──▶ done
        >        [status/    [status/     [status/   [status/
        >         triage]     approved]    queued]    claimed]
        > ```
        > You filed it. A maintainer sets kind/area/priority and removes `status/triage`.
        > `/approve` queues it. A contributor or agent `/claim`s it and ships the fix.

  - type: checkboxes
    id: checks
    attributes:
      label: "Before submitting"
      options:
        - label: "I searched existing issues and this is not a duplicate"
          required: true

  - type: input
    id: report-link
    attributes:
      label: "ujust report gist URL"
      placeholder: "https://gist.github.com/..."
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: "What happened?"
      description: "What did you see? What did you expect? Be specific."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: "Steps to reproduce"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: "Extra context"
    validations:
      required: false
