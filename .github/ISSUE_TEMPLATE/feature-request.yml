name: "Feature request"
description: "Propose something new. Specific proposals ship. Vague ones wait."
labels: ["kind/enhancement", "status/discussing"]
type: "Feature"
body:
  - type: markdown
    attributes:
      value: |
        ## Humans decide what gets built. Contributors build it.

        The bottleneck is almost never implementation. It is clarity.

        Contributors can implement well-scoped work fast. But they can only act on what is clearly defined.

        > **How this gets built:**
        > ```
        > filed ──▶ discussing ──▶ approved ──▶ queued ──▶ claimed ──▶ done
        >        [status/         [status/     [status/   [status/
        >         discussing]      approved]    queued]    claimed]
        > ```
        > Your proposal enters discussion. A maintainer approves it when the spec is clear.
        > Then a contributor or agent `/claim`s it and builds it.

  - type: textarea
    id: problem
    attributes:
      label: "What would you like to see?"
      description: "Plain language. What is missing, broken, or annoying?"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "Proposed solution"
      description: "If you have one. Vague 'just add X' without rationale waits."
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: "Extra context"
    validations:
      required: false
